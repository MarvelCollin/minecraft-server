x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft-server
    restart: unless-stopped
    mem_limit: "${CONTAINER_MEMORY_LIMIT:-5G}"
    ports:
      - "${SERVER_PORT:-25565}:25565"
    environment:
      EULA: "TRUE"
      TYPE: "${SERVER_TYPE:-VANILLA}"
      VERSION: "${SERVER_VERSION:-LATEST}"
      MEMORY: "${SERVER_MEMORY:-4G}"
      DIFFICULTY: "${DIFFICULTY:-normal}"
      MODE: "${GAME_MODE:-survival}"
      MOTD: "${MOTD:-A Minecraft Server}"
      ICON: "${SERVER_ICON:-}"
      MAX_PLAYERS: "${MAX_PLAYERS:-20}"
      VIEW_DISTANCE: "${VIEW_DISTANCE:-8}"
      SIMULATION_DISTANCE: "${SIMULATION_DISTANCE:-6}"
      ONLINE_MODE: "true"
      ENABLE_WHITELIST: "${ENABLE_WHITELIST:-false}"
      WHITELIST: "${WHITELIST:-}"
      OPS: "${OPS:-}"
      MODS: "${MODS:-}"
      MODS_FILE: "/extras/mods.txt"
      REMOVE_OLD_MODS: "${REMOVE_OLD_MODS:-false}"
      MODRINTH_PROJECTS: "${MODRINTH_PROJECTS:-}"
      MODRINTH_DOWNLOAD_DEPENDENCIES: "${MODRINTH_DOWNLOAD_DEPENDENCIES:-required}"
      ENABLE_COMMAND_BLOCK: "false"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD:?Set RCON_PASSWORD in .env before starting. Run ./mc.sh setup to generate one.}"
      RCON_PORT: "25575"
      RCON_CMDS_STARTUP: |-
        gamerule minecraft:keep_inventory ${KEEP_INVENTORY:-false}
        gamerule minecraft:mob_griefing ${MOB_GRIEFING:-true}
        gamerule minecraft:fire_spread_radius_around_player ${FIRE_SPREAD_RADIUS:--1}
        gamerule minecraft:advance_time ${DAYLIGHT_CYCLE:-true}
    volumes:
      - ./data:/data
      - ./mods.txt:/extras/mods.txt:ro
    stdin_open: true
    tty: true
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mc-health"]
      start_period: 1m
      interval: 5s
      retries: 20

  backup:
    image: itzg/mc-backup:latest
    container_name: minecraft-backup
    restart: unless-stopped
    depends_on:
      - minecraft
    environment:
      BACKUP_INTERVAL: "${BACKUP_INTERVAL:-6h}"
      RCON_HOST: minecraft
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD:?Set RCON_PASSWORD in .env before starting. Run ./mc.sh setup to generate one.}"
      PRUNE_BACKUPS_DAYS: "${BACKUP_RETENTION_DAYS:-7}"
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    logging: *default-logging

  playit:
    image: ghcr.io/playit-cloud/playit-agent:latest
    container_name: minecraft-playit
    restart: unless-stopped
    profiles: ["playit"]
    depends_on:
      - minecraft
    environment:
      SECRET_KEY: "${PLAYIT_SECRET_KEY:-}"
    logging: *default-logging
