services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft-server
    restart: unless-stopped
    mem_limit: "${CONTAINER_MEMORY_LIMIT:-5G}"
    ports:
      - "${SERVER_PORT:-25565}:25565"
    environment:
      EULA: "TRUE"
      TYPE: "${SERVER_TYPE:-VANILLA}"
      VERSION: "${SERVER_VERSION:-LATEST}"
      MEMORY: "${SERVER_MEMORY:-4G}"
      DIFFICULTY: "${DIFFICULTY:-normal}"
      MODE: "${GAME_MODE:-survival}"
      MOTD: "${MOTD:-A Minecraft Server}"
      ICON: "${SERVER_ICON:-}"
      MAX_PLAYERS: "${MAX_PLAYERS:-20}"
      VIEW_DISTANCE: "${VIEW_DISTANCE:-8}"
      SIMULATION_DISTANCE: "${SIMULATION_DISTANCE:-6}"
      ONLINE_MODE: "true"
      ENABLE_WHITELIST: "${ENABLE_WHITELIST:-false}"
      WHITELIST: "${WHITELIST:-}"
      OPS: "${OPS:-}"
      ENABLE_COMMAND_BLOCK: "false"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD:?Set RCON_PASSWORD in .env before starting. Run scripts/setup.sh to generate one.}"
      RCON_PORT: "25575"
      RCON_CMDS_STARTUP: |-
        gamerule keepInventory ${KEEP_INVENTORY:-false}
        gamerule mobGriefing ${MOB_GRIEFING:-true}
        gamerule doFireTick ${FIRE_TICK:-true}
        gamerule doDaylightCycle ${DAYLIGHT_CYCLE:-true}
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "mc-health"]
      start_period: 1m
      interval: 5s
      retries: 20

  backup:
    image: itzg/mc-backup:latest
    container_name: minecraft-backup
    restart: unless-stopped
    depends_on:
      - minecraft
    environment:
      BACKUP_INTERVAL: "${BACKUP_INTERVAL:-6h}"
      RCON_HOST: minecraft
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD:?Set RCON_PASSWORD in .env before starting. Run scripts/setup.sh to generate one.}"
      PRUNE_BACKUPS_DAYS: "${BACKUP_RETENTION_DAYS:-7}"
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
